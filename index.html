<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
</head>

<body>
    <form action="/" method="POST">
        <fieldset>
            <legend>Cadastro</legend>
            <label for="nome">Nome:</label><br />
            <input type="text" name="nome"><br />
            <label for="email">Email:</label><br />
            <input type="email" name="email"><br />
            <label for="senha">Senha:</label><br />
            <input type="password" name="senha"><br />
            <label for="datanasc">Data de Nascimento</label><br />
            <input type="date" name="datanasc"><br />
            <label for="sexo">Sexo:</label><br />
            <input type="radio" name="sexo" value="masculino"> Masculino<br />
            <input type="radio" name="sexo" value="feminino"> Feminino<br />
            <label for="linguagens">Linguagem</label><br />
            <input type="checkbox" name="linguagens" value="python"> Python<br />
            <input type="checkbox" name="linguagens" value="java"> Java<br />
            <input type="checkbox" name="linguagens" value="c++"> C++<br />    
            <input type="submit">
        </fieldset>
    </form>
</body>
</html>
